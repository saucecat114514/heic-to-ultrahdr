# libultrahdr gain-map metadata template (the tool writes this per-run from --boost).
# maxContentBoost = HDR brightness ceiling (linear gain). hdrCapacityMax is pinned to
# it so any display with that much headroom shows the full boost; weaker HDR displays
# scale down. Tune the boost value on a real HDR display.
--maxContentBoost 3.0 3.0 3.0
--minContentBoost 1.0 1.0 1.0
--gamma 1.0 1.0 1.0
--offsetSdr 0.0 0.0 0.0
--offsetHdr 0.0 0.0 0.0
--hdrCapacityMin 1.0
--hdrCapacityMax 3.0
--useBaseColorSpace 1
